# Unified corpus schema. Every corpus is mapped to a common layout so the code
# is corpus-agnostic. {pid} is substituted with the participant id (e.g. 300).
#
# Current setup: DAIC-WOZ (AVEC2017) only. Folders are named <pid>_P and contain
# <pid>_AUDIO.wav and <pid>_TRANSCRIPT.csv (tab-separated). The three labelled
# split files are concatenated by 00_build_manifests.py and re-split later by the
# leakage-free participant-level CV.
daic_woz:
  corpus: daic
  language: en
  audio_dir: data/raw/daic/{pid}_P/{pid}_AUDIO.wav
  transcript: data/raw/daic/{pid}_P/{pid}_TRANSCRIPT.csv
  transcript_sep: "\t"               # DAIC transcripts are TAB-separated
  prompts_speaker: Ellie             # interviewer name used to cut segments
  label_csv:                         # concatenated; blind test_split (no label) omitted
    - data/raw/daic/train_split_Depression_AVEC2017.csv
    - data/raw/daic/dev_split_Depression_AVEC2017.csv
    - data/raw/daic/full_test_split.csv
  # Optional modalities — used only if the files exist, otherwise masked.
  acoustic: data/raw/daic/{pid}_P/{pid}_COVAREP.csv
  visual: data/raw/daic/{pid}_P/{pid}_CLNF_AUs.txt
  label_threshold: 10                # PHQ-8 >= 10 -> positive (already binarised here)

